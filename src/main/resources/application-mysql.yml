# MySQL production configuration
# Activate with: --spring.profiles.active=mysql
# Or set in application.yml: spring.profiles.active: mysql

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/atsdb?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: root
  h2:
    console:
      enabled: false
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
